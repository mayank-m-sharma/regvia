services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: regvia
      POSTGRES_PASSWORD: regvia
      POSTGRES_DB: regvia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://regvia:regvia@postgres:5432/regvia
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
      - path: ./backend/.env.local
        required: false
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  celery-worker:
    build: ./backend
    command: uv run celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://regvia:regvia@postgres:5432/regvia
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
      - path: ./backend/.env.local
        required: false
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  flower:
    build: ./backend
    command: uv run celery -A app.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
      - path: ./backend/.env.local
        required: false
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: regvia
      MINIO_ROOT_PASSWORD: regvia123
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
