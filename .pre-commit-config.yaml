repos:
  - repo: local
    hooks:
      # ── Backend (Python) ──────────────────────────────────────────────────
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd backend && ~/.local/bin/uv run ruff check --fix'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd backend && ~/.local/bin/uv run ruff format'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && ~/.local/bin/uv run mypy .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: pytest
        name: pytest (unit)
        entry: bash -c 'cd backend && ~/.local/bin/uv run pytest tests/unit/ -q'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      # ── Frontend (TypeScript) ─────────────────────────────────────────────
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && pnpm lint'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: tsc
        name: tsc
        entry: bash -c 'cd frontend && pnpm type-check'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: vitest
        name: vitest (unit)
        entry: bash -c 'cd frontend && pnpm vitest run'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
